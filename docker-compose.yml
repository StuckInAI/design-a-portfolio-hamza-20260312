version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    ports:
      - '3000:3000'
    volumes:
      - portfolio-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/portfolio.sqlite
      - NEXT_PUBLIC_SITE_TITLE=My Portfolio
      - NEXT_PUBLIC_SITE_DESCRIPTION=Personal portfolio and project showcase
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  portfolio-data:
    driver: local
